<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MedGuardian AI — Secure Login</title>
<!-- Firebase SDK -->

<style>
  :root{
    --navy:#0B2545;
    --navy-2:#11304F;
    --teal:#028090;
    --seafoam:#00A896;
    --mint:#02C39A;
    --coral:#E8543B;
    --ink:#1E293B;
    --muted:#64748B;
    --paper:#F6FAFA;
    --white:#FFFFFF;
    --line:#E2E8EC;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:Calibri, "Segoe UI", Arial, sans-serif;
    background:var(--paper);
    color:var(--ink);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
  }
  .card{
    background:#fff; border-radius:12px; padding:32px;
    box-shadow:0 6px 20px rgba(11,37,69,.12);
    width: 400px;
    max-width: 90%;
  }
  .brand{display:flex; align-items:center; gap:10px; margin-bottom:20px; justify-content:center;}
  .brand .badge{
    width:42px;height:42px;border-radius:50%;background:var(--teal);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .brand .badge svg{width:22px;height:22px;fill:#fff;}
  .brand h1{font-size:22px; color:var(--navy); margin:0; font-family:Cambria, Georgia, serif;}
  
  .tabs{display:flex; margin-bottom:24px; border-bottom:2px solid var(--line);}
  .tab{flex:1; text-align:center; padding:10px; cursor:pointer; font-weight:bold; color:var(--muted); border-bottom:2px solid transparent; margin-bottom:-2px;}
  .tab.active{color:var(--teal); border-bottom-color:var(--teal);}

  .form-group{margin-bottom:16px;}
  label{display:block; font-size:12px; color:var(--muted); margin-bottom:6px; font-weight:bold;}
  input, select{
    width:100%; padding:12px; border-radius:8px; border:1px solid var(--line);
    font-size:14px; font-family:Calibri; color:var(--ink); background:var(--paper);
  }
  .btn{
    border:none; border-radius:8px; padding:12px; font-size:14px; font-weight:bold;
    cursor:pointer; transition:transform .1s; width:100%;
    background:var(--teal); color:#fff;
  }
  .btn:active{transform:scale(.98);}
  .btn:hover{background:#026c79;}
  .btn:disabled{opacity: 0.6; cursor: not-allowed;}
  
  .error-msg{color:var(--coral); font-size:12px; margin-bottom:10px; text-align:center; min-height:14px;}
  .success-msg{color:var(--seafoam); font-size:12px; margin-bottom:10px; text-align:center; min-height:14px; font-weight:bold;}
  
  #staff-login-form, #staff-signup-form, #device-request-panel{display:none;}

  .crypto-badge {
      display: inline-block;
      background: #E0F2F1;
      color: #00695C;
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 4px;
      margin-bottom: 15px;
      text-align: center;
      width: 100%;
      border: 1px solid #B2DFDB;
  }
</style>
<!-- Include our new Web Crypto utility -->
<script src="js/crypto-auth.js"></script>
</head>
<body>

<div class="card">
  <div class="brand">
    <div class="badge"><svg viewBox="0 0 512 512"><path d="M466.5 83.7l-192-80a48.15 48.15 0 0 0-36.9 0l-192 80C27.7 91.1 16 108.6 16 128c0 198.5 114.5 335.7 221.5 380.3a48.09 48.09 0 0 0 36.9 0C360.1 472.6 496 349.3 496 128c0-19.4-11.7-36.9-29.5-44.3z"/></svg></div>
    <h1>MedGuardian AI</h1>
  </div>
  
  <div class="tabs" id="tab-container">
    <div class="tab active" id="tab-patient-login" onclick="switchTab('patient-login')">Patient</div>
    <div class="tab" id="tab-staff-login" onclick="switchTab('staff-login')">Doctor</div>
  </div>

  <div class="error-msg" id="error-msg"></div>
  <div class="success-msg" id="success-msg"></div>

  <!-- Patient Login Form -->
  <form id="patient-login-form" onsubmit="handlePatientLogin(event)">
    <div class="form-group">
      <label>Patient UserID</label>
      <input type="text" id="patient-userid" placeholder="e.g. PT-123456" required>
    </div>
    <button type="submit" class="btn">Access Vault</button>
  </form>

  <div id="patient-qr-container" style="display:none; text-align:center; margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--line);">
    <p style="font-size:13px; color:var(--muted); margin-bottom:12px;"><strong>Emergency Access</strong><br>Scan for critical health info</p>
    <img id="persistent-qr-img" src="" alt="Emergency QR Code" style="width: 140px; height: 140px; border-radius: 8px; border: 2px solid var(--line); padding: 8px; background: #fff;">
  </div>

  <!-- Staff Passwordless Login Form -->
  <form id="staff-login-form" onsubmit="handleStaffLogin(event)" style="display:none;">
    <div class="crypto-badge">🔒 Hardware-Backed Cryptographic Login</div>
    <div class="form-group">
      <label>Role</label>
      <select id="login-role">
          <option value="doctor">Doctor</option>
          <option value="admin">Administrator</option>
      </select>
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="staff-login-email" required placeholder="name@hospital.com">
    </div>
    <button type="submit" class="btn" id="btn-staff-login">Authenticate Securely</button>
  </form>

  </form>
</div>

<script>
  const API_BASE = window.location.hostname === 'localhost' ? 'http://localhost:3000/api' : 'https://vortexa-mf1f.onrender.com/api';

  function clearMessages() {
      document.getElementById('error-msg').innerText = '';
      document.getElementById('success-msg').innerText = '';
  }

  function switchTab(tab) {
    clearMessages();
    
    document.getElementById('tab-patient-login').classList.remove('active');
    document.getElementById('tab-staff-login').classList.remove('active');
    
    document.getElementById('patient-login-form').style.display = 'none';
    document.getElementById('staff-login-form').style.display = 'none';
    
    if (document.getElementById('device-request-panel')) {
        document.getElementById('device-request-panel').style.display = 'none';
    }
    
    document.getElementById('tab-container').style.display = 'flex';
    
    if (tab === 'patient-login') {
      document.getElementById('tab-patient-login').classList.add('active');
      document.getElementById('patient-login-form').style.display = 'block';
    } else if (tab === 'staff-login') {
      document.getElementById('tab-staff-login').classList.add('active');
      document.getElementById('staff-login-form').style.display = 'block';
    }
    
    if (typeof loadPersistentPatientQR === 'function') {
        loadPersistentPatientQR();
    }
  }

  async function handlePatientLogin(e) {
    e.preventDefault();
    const userid = document.getElementById('patient-userid').value;
    clearMessages();

    try {
      const res = await fetch(`${API_BASE}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userid })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Login failed');
      
      localStorage.setItem('medguardian_token', data.token);
      localStorage.setItem('medguardian_user', JSON.stringify(data.user));
      // Update userid and immediately refresh the QR before redirecting
      localStorage.setItem('last_patient_userid', userid);
      loadPersistentPatientQR();

      document.getElementById('success-msg').innerText = 'Login successful! Redirecting...';
      setTimeout(() => { window.location.href = 'index.html'; }, 1500);
    } catch (err) {
      document.getElementById('error-msg').innerText = err.message;
    }
  }

  // --- CRYPTO AUTHENTICATION (PASSWORDLESS) ---
  async function handleStaffLogin(e) {
      e.preventDefault();
      clearMessages();
      const btn = document.getElementById('btn-staff-login');
      btn.disabled = true;
      btn.innerText = 'Verifying Identity...';

      const role = document.getElementById('login-role').value;
      const email = document.getElementById('staff-login-email').value;

      try {
          // 1. Request Challenge
          const challengeRes = await fetch(`${API_BASE}/auth/crypto/${role}/challenge`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ email })
          });
          const challengeData = await challengeRes.json();
          if (!challengeRes.ok) {
              if (challengeData.requiresSetup) {
                  // AUTO-SETUP DEVICE
                  document.getElementById('error-msg').innerText = "First-time login detected. Setting up secure key...";
                  const publicKeyPem = await generateKeyPair(email);
                  
                  const registerRes = await fetch(`${API_BASE}/auth/crypto/${role}/register`, {
                      method: 'POST',
                      headers: { 'Content-Type': 'application/json' },
                      body: JSON.stringify({ email, publicKey: publicKeyPem, deviceName: navigator.userAgent })
                  });
                  const registerData = await registerRes.json();
                  if (!registerRes.ok) throw new Error(registerData.error || 'Device setup failed');
                  
                  document.getElementById('success-msg').innerText = "Device securely registered! Please click Authenticate Securely again to log in.";
                  return;
              }
              throw new Error(challengeData.error || 'Failed to get challenge');
          }

          // 2. Browser signs the challenge using Private Key from IndexedDB
          let cryptoPayload;
          try {
              cryptoPayload = await signChallenge(email, challengeData.challenge);
          } catch (keyErr) {
              if (keyErr.message === 'NO_KEY_FOUND') {
                  throw new Error('No registered cryptographic identity found on this device for the provided email.'); 
              }
              throw keyErr;
          }

          // 3. Send Signature to Backend
          const verifyRes = await fetch(`${API_BASE}/auth/crypto/${role}/verify`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                  email,
                  signature: cryptoPayload.signature,
                  clientDataJSON: cryptoPayload.clientDataJSON
              })
          });

          const verifyData = await verifyRes.json();
          if (!verifyRes.ok) throw new Error(verifyData.error || 'Signature verification failed');

          // Success!
          document.getElementById('success-msg').innerText = verifyData.message; 
          localStorage.setItem('medguardian_token', verifyData.token);
          localStorage.setItem('medguardian_user', JSON.stringify(verifyData.user));
          
          setTimeout(() => {
              window.location.href = 'index.html';
          }, 1000);

      } catch (err) {
          if (err.message) {
              document.getElementById('error-msg').innerText = err.message;
          }
      } finally {
          btn.disabled = false;
          btn.innerText = 'Authenticate Securely';
      }
  }

  function requestNewDevice() {
      // Stub for device request workflow
      alert("Device registration request sent to Administrators for approval.");
      switchTab('staff-login');
  }

  // Persistent QR Code Logic
  function loadPersistentPatientQR() {
      const lastPatientUserId = localStorage.getItem('last_patient_userid');
      const qrContainer = document.getElementById('patient-qr-container');
      const isPatientTab = document.getElementById('tab-patient-login').classList.contains('active');

      if (lastPatientUserId && isPatientTab) {
          const qrUrl = window.location.origin + '/emergency.html?userid=' + encodeURIComponent(lastPatientUserId);
          document.getElementById('persistent-qr-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(qrUrl)}&color=0B2545&bgcolor=FFFFFF`;
          qrContainer.style.display = 'block';
      } else {
          qrContainer.style.display = 'none';
      }
  }

  // Check on load
  document.addEventListener('DOMContentLoaded', loadPersistentPatientQR);

</script>
</body>
</html>
